version: '3.8'

# Production docker-compose for self-hosted deployments (VPS/DigitalOcean/AWS EC2)
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tiermaker-backend
    restart: always
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: 7d
      JWT_REFRESH_EXPIRATION: 30d
      ADMIN_EMAIL: na5893395@gmail.com
      PORT: 4000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    container_name: tiermaker-frontend
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy

  # Reverse proxy (optional - use if not behind Cloudflare/other proxy)
  nginx:
    image: nginx:alpine
    container_name: tiermaker-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
